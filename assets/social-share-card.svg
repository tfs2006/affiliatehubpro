    <rect x="24" y="72" width="14" height="20" rx="7" fill="#172024" fill-opacity="0.14"/>
    <rect x="46" y="54" width="14" height="38" rx="7" fill="#172024" fill-opacity="0.18"/>
    <rect x="68" y="34" width="14" height="58" rx="7" fill="#127c78"/>
