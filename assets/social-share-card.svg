      <stop offset="1" stop-color="#0f6f6a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#081013" flood-opacity="0.26"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
