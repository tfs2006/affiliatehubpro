<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Affiliate Hub Pro icon</title>
  <desc id="desc">Brand app icon showing a dashboard frame, metrics bars, and a growth trajectory.</desc>
  <defs>
    <linearGradient id="bg" x1="66" y1="44" x2="444" y2="468" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff9ef"/>
