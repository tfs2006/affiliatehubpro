    <text x="0" y="176" font-family="Trebuchet MS, Verdana, Arial, sans-serif" font-size="90" font-weight="700" letter-spacing="-2.6" fill="#172024">Browser Game</text>
    <text x="0" y="244" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#5a6267">Practice offers, traffic, trust, and monetization.</text>
