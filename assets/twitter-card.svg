<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">Affiliate Hub Pro Twitter card</title>
  <desc id="desc">Wide social card for Affiliate Hub Pro with stronger typography and simulator dashboard visuals.</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="36" x2="1518" y2="774" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff9ef"/>
      <stop offset="0.52" stop-color="#f6ead9"/>
