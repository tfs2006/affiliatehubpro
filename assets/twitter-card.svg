  <rect width="1600" height="800" fill="url(#bg)"/>
  <circle cx="156" cy="140" r="138" fill="#db5c34" fill-opacity="0.1"/>
  <circle cx="1428" cy="118" r="130" fill="#127c78" fill-opacity="0.09"/>
  <g transform="translate(90 88)">
