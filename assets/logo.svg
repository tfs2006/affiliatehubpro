<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" role="img" aria-labelledby="title desc">
  <title id="title">Affiliate Hub Pro logo</title>
  <desc id="desc">A rounded badge with a chart arrow and the Affiliate Hub Pro wordmark.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ea"/>
      <stop offset="100%" stop-color="#f3ead7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#db5c34"/>
      <stop offset="100%" stop-color="#f0ad42"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#127c78"/>
      <stop offset="100%" stop-color="#1aa89d"/>
    </linearGradient>
  </defs>
  <rect width="560" height="180" rx="36" fill="none"/>
  <g transform="translate(18 18)">
    <rect width="144" height="144" rx="34" fill="url(#panel)" stroke="#172024" stroke-opacity="0.08"/>
    <rect x="22" y="95" width="18" height="27" rx="9" fill="#172024" fill-opacity="0.12"/>
    <rect x="50" y="76" width="18" height="46" rx="9" fill="#172024" fill-opacity="0.16"/>
    <rect x="78" y="54" width="18" height="68" rx="9" fill="url(#teal)"/>
    <path d="M33 79 C48 68 58 60 74 61 C89 62 100 45 115 28" fill="none" stroke="url(#accent)" stroke-width="13" stroke-linecap="round"/>
    <path d="M104 27 L120 27 L120 44" fill="none" stroke="url(#accent)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="112" cy="35" r="8" fill="#172024"/>
  </g>
  <g transform="translate(190 38)" fill="#172024">
    <text x="0" y="50" font-family="'Space Grotesk', 'IBM Plex Sans', sans-serif" font-size="46" font-weight="700" letter-spacing="-1.8">Affiliate Hub Pro</text>
    <text x="0" y="92" font-family="'IBM Plex Sans', sans-serif" font-size="22" font-weight="600" fill="#127c78">Interactive affiliate marketing simulator</text>
    <text x="0" y="130" font-family="'IBM Plex Sans', sans-serif" font-size="18" fill="#5a6267">Offers, channels, trust, compounding, and cash flow</text>
  </g>
